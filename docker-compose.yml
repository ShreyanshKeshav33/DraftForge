services:
  db:
    image: postgres:16
    container_name: draftforge_db
    environment:
      POSTGRES_USER: draftforge
      POSTGRES_PASSWORD: draftforge123
      POSTGRES_DB: draftforge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: